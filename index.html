<!doctype html>
<html lang="ru">
<head>
<link href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&display=swap" rel="stylesheet">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hannamimiimi</title>
<style>
:root{--bg:#fff0f5}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,Helvetica,sans-serif;
  :linear-gradient(135deg,#fff0f5 0%,#ffd7e6 100%);
  color:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
}
/* ПУЛЬСИРУЮЩИЙ ФОН (вставь в <style>) */
.container::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  -image: url("background2.jpg"); /* <- имя файла чувствительно к регистру */
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -2;
  transform-origin: center center;
  will-change: transform;
  animation: bgPulse 20s ease-in-out infinite;
}

/* Полупрозрачный цветовой фильтр поверх картинки (чтобы текст читался) */
.container::after{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  : linear-gradient(180deg, rgba(255,240,245,0.28), rgba(255,215,230,0.36));
  z-index: -1;
  pointer-events: none;
}

/* Анимация — масштабирование */
@keyframes bgPulse{
  0%   { transform: scale(1); }
  50%  { transform: scale(1.04); } /* увеличивается на 4% */
  100% { transform: scale(1); }
}

/* Мобильные устройства — поменьше масштаб и быстрее цикл (чтобы не нагружать) */
@media (max-width: 600px){
  .container::before{
    animation: bgPulseMobile 14s ease-in-out infinite;
  }
  @keyframes bgPulseMobile{
    0%   { transform: scale(1); }
    50%  { transform: scale(1.02); } /* меньше масштаба на телефонах */
    100% { transform: scale(1); }
  }
}
.avatar{
  width:110px;height:110px;border-radius:50%;object-fit:cover;
  margin:0 auto 18px;box-shadow:0 6px 20px rgba(0,0,0,.08);
}
.title{font-size:1.6rem;margin:0 0 6px}
.desc{opacity:.85;margin:0 0 18px}
.links{display:flex;flex-direction:column;gap:12px}
/* --- стиль кнопок в духе incognitofox --- */
.link{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;                       /* расстояние между иконкой и текстом */
  padding:16px 26px;              /* вертикальная/горизонтальная подушка */
  border-radius:50px;             /* большая скруглённая "pill" форма */
  text-decoration:none;
  color:#fff;                     /* белый текст поверх градиента */
  :linear-gradient(135deg,#ff6b9d 0%,#ffb6c1 100%); /* розово-пастельный градиент */
  box-shadow:0 6px 18px rgba(255,107,157,0.18), 0 0 30px rgba(255,182,193,0.06);
  transition:transform .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s, filter .22s;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  text-align:center;
  white-space:nowrap;
  font-family: 'La Belle Aurore', cursive; /* у тебя этот шрифт подключён */
  font-size:inherit; /* оставляем текущий размер (ты уже подбирал раньше) */
  letter-spacing: .5px;
}

/* эффект при наведении — подъём + усиление свечения */
.link:hover{
  transform:translateY(-6px);
  box-shadow:0 14px 40px rgba(255,107,157,0.30), 0 0 50px rgba(255,182,193,0.14);
  filter:brightness(1.03);
}

/* лёгкая реакция при клике */
.link:active{
  transform:translateY(-2px);
  transition:transform .08s;
}

/* иконка слева (если используешь <img> или <span> для эмодзи) */
.button-icon{
  width:32px;
  height:32px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  margin-right:6px;
  font-size:20px; /* размер если используешь эмодзи вместо изображения */
}

/* дополнительная мягкая анимация для первой кнопки (опционально) */
.link:first-child{
  animation:softGlow 3s infinite ease-in-out;
}
@keyframes softGlow{
  0%,100%{ box-shadow:0 6px 18px rgba(255,107,157,0.18), 0 0 30px rgba(255,182,193,0.06) }
  50%{    box-shadow:0 12px 36px rgba(255,107,157,0.28), 0 0 56px rgba(255,182,193,0.12) }
}
.link:hover{
  transform:translateY(-3px);transition:all .18s;
  box-shadow:0 8px 26px rgba(0,0,0,.08);
}
.footer{margin-top:20px;font-size:.8rem;opacity:.6}
</style>
</head>
<body>
<div class="container">
<img class="avatar" src="avatar.PNG" alt="avatar">
<h1 class="title">hannamimiimi</h1>
<p class="desc"></p>
<div class="links">
<a class="link" href="https://boosty.to/druggkittyy" target="_blank" rel="noopener">secret content🩷</a>
<a class="link" href="https://fansly.com/Honeylittlegirl/posts" target="_blank" rel="noopener">exclusive content🩷</a>
</div>
<p class="footer">© <span id="year"></span></p>
</div>
<script>document.getElementById('year').textContent=new Date().getFullYear()</script>
</body>
</html>
